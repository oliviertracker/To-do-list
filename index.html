<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Finale</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chrono-node/2.4.12/chrono.min.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-grey: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-grey); margin: 0; padding: 10px; padding-bottom: 50px; }
        
        /* Calendrier large et cliquable */
        .card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #calendar { height: 350px; }

        /* Infos de sélection */
        .status-bar { color: var(--ios-blue); font-weight: bold; margin: 10px 0; font-size: 14px; text-align: center; }

        /* Saisie */
        .input-box { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        #user-text { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
        .btn-action { border: none; background: none; font-size: 24px; }
        .btn-ok { background: var(--ios-blue); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

        /* Grille de Blocs (Boutons de rangement) */
        .grid-blocks { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .block { 
            background: white; border-radius: 15px; padding: 15px; text-align: center; 
            border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .block.selected { border-color: var(--ios-blue); background: #EBF5FF; }
        .block-icon { font-size: 24px; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <div id="calendar"></div>
    </div>

    <div class="status-bar" id="info">📅 Date : Aujourd'hui | 📂 Dossier : Notes</div>

    <div class="input-box">
        <button class="btn-action" onclick="talk()">🎙️</button>
        <input type="text" id="user-text" placeholder="Note ou fichier..." oninput="checkDate()">
        <button class="btn-action" onclick="document.getElementById('file').click()">📎</button>
        <button class="btn-ok" onclick="save()">OK</button>
    </div>

    <div class="grid-blocks">
        <div class="block selected" id="tab-Notes" onclick="setTab('Notes', '📝')">
            <span class="block-icon">📝</span><b>Notes</b>
        </div>
        <div class="block" id="tab-Paies" onclick="setTab('Paies', '📄')">
            <span class="block-icon">📄</span><b>Paies</b>
        </div>
        <div class="block" id="tab-Banque" onclick="setTab('Banque', '🏦')">
            <span class="block-icon">🏦</span><b>Banque</b>
        </div>
        <div class="block" id="tab-Impôts" onclick="setTab('Impôts', '⚖️')">
            <span class="block-icon">⚖️</span><b>Impôts</b>
        </div>
    </div>

    <input type="file" id="file" style="display:none" onchange="picked()">

    <script>
        let calendar;
        let activeDate = new Date();
        let activeTab = "Notes";
        let hasFile = false;

        window.onload = () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'fr',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                dateClick: (info) => {
                    activeDate = new Date(info.dateStr);
                    refreshUI();
                    // Effet visuel sur la case
                    document.querySelectorAll('.fc-daygrid-day').forEach(el => el.style.background = "");
                    info.dayEl.style.background = "#D1E9FF";
                }
            });
            calendar.render();
        };

        function setTab(name) {
            activeTab = name;
            document.querySelectorAll('.block').forEach(b => b.classList.remove('selected'));
            document.getElementById('tab-' + name).classList.add('selected');
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('info').innerText = `📅 ${activeDate.toLocaleDateString('fr-FR')} | 📂 ${activeTab}`;
        }

        function talk() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.lang = 'fr-FR';
            rec.onresult = (e) => {
                document.getElementById('user-text').value = e.results[0][0].transcript;
                checkDate();
            };
            rec.start();
        }

        function checkDate() {
            const text = document.getElementById('user-text').value;
            const found = chrono.fr.parseDate(text);
            if (found) {
                activeDate = found;
                calendar.gotoDate(activeDate);
                refreshUI();
            }
        }

        function picked() {
            hasFile = true;
            document.getElementById('user-text').value = "📎 Fichier sélectionné";
        }

        function save() {
            const txt = document.getElementById('user-text').value;
            if(!txt) return;

            calendar.addEvent({
                title: (hasFile ? "📎 " : "📝 ") + txt,
                start: activeDate,
                allDay: true,
                color: activeTab === 'Notes' ? 'orange' : 'blue'
            });

            alert(`Enregistré dans ${activeTab} au ${activeDate.toLocaleDateString()}`);
            
            // Reset
            document.getElementById('user-text').value = "";
            hasFile = false;
        }
    </script>
</body>
</html>
